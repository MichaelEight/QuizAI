<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizAI</title>
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/webp" sizes="96x96" href="/favicon-96x96.webp" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.webp" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- GoatCounter analytics (cookie-less, GDPR-safe). Loads only outside localhost. -->
    <script>
      ;(function () {
        var code = 'michaeleight' // shared site code across app.michaeleight.com
        if (!code || location.hostname === 'localhost') return
        var s = document.createElement('script')
        s.async = true
        s.src = 'https://gc.zgo.at/count.js'
        s.dataset.goatcounter = 'https://' + code + '.goatcounter.com/count'
        document.head.appendChild(s)
      })()
    </script>
  </body>
</html>
